# eclexiaiser manifest for vscode-k9

[project]
name = "vscode-k9"

[[functions]]
name = "index"
source = "src/index.ts"
energy-budget-mj = 10

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
