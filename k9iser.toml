#
# k9iser manifest for vscode-k9
# VS Code K9 extension — language support and tooling for K9 contracts in Visual Studio Code

[project]
name = "vscode-k9"
safety_tier = "hunt"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = "Containerfile"
type = "containerfile"
output = "generated/k9iser/container-build.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "container.base_image uses chainguard or distroless"
severity = "warn"
